# Pre-commit hooks for Django/PostgreSQL/GraphQL project
# Install: pip install pre-commit
# Run: pre-commit install
# Update: pre-commit autoupdate

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: requirements-txt-fixer

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.13
        args: [--config=pyproject.toml]

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--settings-path=pyproject.toml]

  # Linting with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--config=.flake8]
        additional_dependencies:
          - flake8-bugbear
          - flake8-django
          - flake8-docstrings
          - flake8-comprehensions
          - flake8-simplify

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - django-stubs
          - djangorestframework-stubs
          - types-requests
          - types-PyYAML
        exclude: ^(migrations|tests)/

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # Django specific checks
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        args: [--target-version, "5.1"]

  # Prettier formatting (JSON, YAML, Markdown, HTML, CSS, GraphQL)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [json, yaml, markdown, html, css, javascript, graphql]
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-jinja-template@2.0.0

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # GraphQL schema validation (if schema file exists)
  - repo: local
    hooks:
      - id: graphql-schema-linter
        name: GraphQL Schema Linter
        entry: bash -c 'if command -v graphql-schema-linter &> /dev/null; then graphql-schema-linter schema.graphql; fi'
        language: system
        files: \.graphql$
        pass_filenames: false

# Configuration for local development
default_language_version:
  python: python3.13

# Only run on staged files
default_stages: [commit]

# Fail fast on first error
fail_fast: false

# Exclude files
exclude: |
  (?x)^(
    migrations/|
    node_modules/|
    staticfiles/|
    media/|
    .venv/|
    venv/|
    build/|
    dist/
  )
