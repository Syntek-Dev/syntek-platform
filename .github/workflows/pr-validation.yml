name: PR Validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a capital letter and contain at least one character.

  validate-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check branch naming convention
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Branch name: $BRANCH_NAME"

          # Allow branch patterns: us###/*, feature/*, bugfix/*, hotfix/*, release/*
          if [[ ! $BRANCH_NAME =~ ^(us[0-9]+|feature|bugfix|hotfix|release|docs|refactor|test)/.*$ ]]; then
            echo "❌ Invalid branch name format: $BRANCH_NAME"
            echo "Expected patterns:"
            echo "  - us###/description (e.g., us123/add-authentication)"
            echo "  - feature/description"
            echo "  - bugfix/description"
            echo "  - hotfix/description"
            echo "  - release/version"
            echo "  - docs/description"
            echo "  - refactor/description"
            echo "  - test/description"
            exit 1
          else
            echo "✅ Branch name follows convention"
          fi

  check-pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Count changed lines
          git fetch origin ${{ github.base_ref }}
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4+$6}')
          echo "Changed lines: $CHANGED_LINES"

          # Warn if PR is too large (>1000 lines)
          if [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "⚠️ Warning: This PR has $CHANGED_LINES changed lines"
            echo "Consider breaking it into smaller PRs for easier review"
            # Don't fail, just warn
          else
            echo "✅ PR size is reasonable: $CHANGED_LINES lines"
          fi

  check-migrations:
    name: Check Django Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/test/Dockerfile
          push: false
          load: true
          tags: backend-template:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create test environment file
        run: |
          cp .env.test.example .env.test
          # Generate required secrets for CI
          SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(50))")
          TOKEN_SIGNING_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
          FERNET_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          # Update .env.test with generated values
          sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${SECRET_KEY}|" .env.test
          sed -i "s|^TOKEN_SIGNING_KEY=.*|TOKEN_SIGNING_KEY=${TOKEN_SIGNING_KEY}|" .env.test
          sed -i "s|^TOTP_ENCRYPTION_KEY=.*|TOTP_ENCRYPTION_KEY=${FERNET_KEY}|" .env.test
          sed -i "s|^IP_ENCRYPTION_KEY=.*|IP_ENCRYPTION_KEY=${FERNET_KEY}|" .env.test

      - name: Start database
        run: |
          docker compose -f docker/test/docker-compose.yml up -d db
          # Wait for database to be ready using pg_isready
          docker compose -f docker/test/docker-compose.yml run --rm web \
            bash -c "until pg_isready -h db -p 5432 -U backend_template; do sleep 1; done"

      - name: Check for missing migrations
        run: |
          docker compose -f docker/test/docker-compose.yml run --rm web \
            python manage.py makemigrations --check --dry-run --no-input

      - name: Validate migration files
        run: |
          # Check if any migration files were added
          git fetch origin ${{ github.base_ref }}
          MIGRATION_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "migrations/.*\.py$" || true)

          if [ -n "$MIGRATION_FILES" ]; then
            echo "Found migration files:"
            echo "$MIGRATION_FILES"

            # Validate migrations can be applied
            docker compose -f docker/test/docker-compose.yml run --rm web \
              python manage.py migrate --check
          else
            echo "No migration files found in this PR"
          fi

      - name: Shutdown database
        if: always()
        run: |
          docker compose -f docker/test/docker-compose.yml down -v

  check-secrets:
    name: Check for Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.base.ref == 'main'

    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, PostgreSQL

  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          configFile: .commitlintrc.json

  pr-validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-pr-title, validate-branch-name, check-pr-size, check-migrations, check-secrets, lint-commits]
    if: always()

    steps:
      - name: Check all validation results
        run: |
          if [ "${{ needs.validate-pr-title.result }}" != "success" ] || \
             [ "${{ needs.validate-branch-name.result }}" != "success" ] || \
             [ "${{ needs.check-migrations.result }}" != "success" ] || \
             [ "${{ needs.check-secrets.result }}" != "success" ] || \
             [ "${{ needs.lint-commits.result }}" != "success" ]; then
            echo "❌ PR validation failed"
            exit 1
          else
            echo "✅ All PR validations passed"
          fi
