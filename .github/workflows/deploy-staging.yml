name: Deploy to Staging

# NOTE: This workflow is disabled by default for the template.
# To enable deployments:
# 1. Configure the required secrets in your repository settings
# 2. Uncomment the 'push' trigger below
#
# Required secrets:
#   - CONTAINER_REGISTRY: Docker registry URL (e.g., ghcr.io/your-org)
#   - REGISTRY_USERNAME: Registry username
#   - REGISTRY_PASSWORD: Registry password/token
#   - STAGING_SSH_PRIVATE_KEY: SSH key for deployment server
#   - STAGING_HOST: Staging server hostname
#   - STAGING_USER: SSH username for staging server
#   - STAGING_URL: Staging site URL for health checks
#   - SLACK_WEBHOOK_URL: (optional) Slack notifications
#
# See docs/ARCHITECTURE/CMS-PLATFORM-PLAN.md Phase 15 for deployment details.

on:
  # Uncomment push trigger to enable automatic staging deployments
  # push:
  #   branches:
  #     - staging
  #   paths-ignore:
  #     - '**.md'
  #     - 'docs/**'
  #     - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: staging-deployment
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/staging'
    environment: staging

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.CONTAINER_REGISTRY }}/backend-template
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/staging/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VERSION=${{ github.sha }}
            ENVIRONMENT=staging

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          ssh ${STAGING_USER}@${STAGING_HOST} << 'EOF'
            set -e

            # Navigate to application directory
            cd /opt/backend-template

            # Pull latest image
            docker pull ${{ needs.build-and-push.outputs.image-tag }}

            # Update docker-compose configuration
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
            export ENVIRONMENT=staging

            # Stop current containers
            docker compose -f docker/staging/docker-compose.yml down

            # Run database migrations
            docker compose -f docker/staging/docker-compose.yml run --rm web \
              python manage.py migrate --noinput

            # Collect static files
            docker compose -f docker/staging/docker-compose.yml run --rm web \
              python manage.py collectstatic --noinput

            # Start new containers
            docker compose -f docker/staging/docker-compose.yml up -d

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1

            echo "Staging deployment completed successfully"
          EOF

      - name: Run post-deployment tests
        run: |
          # Wait for application to be ready
          sleep 15

          # Run smoke tests
          curl -f ${{ secrets.STAGING_URL }}/health
          curl -f ${{ secrets.STAGING_URL }}/admin/login/

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Staging Deployment ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            URL: ${{ secrets.STAGING_URL }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-staging
    if: success()

    steps:
      - name: Delete old staging images
        run: |
          echo "Cleanup would run here to remove images older than 7 days"
          # Implementation depends on container registry (ECR, GHCR, etc.)
