services:
  web:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgres://backend_template:backend_template@db:5432/backend_template_dev
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_HOST=mailpit
      - EMAIL_PORT=1025
    depends_on:
      - db
      - redis
      - mailpit

  db:
    image: postgres:18.1-alpine
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=backend_template
      - POSTGRES_PASSWORD=backend_template
      - POSTGRES_DB=backend_template_dev
    ports:
      - "5434:5432" # Map to host port 5434 to avoid conflicts

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8126:8025" # Web UI on host port 8126
      - "1127:1025" # SMTP on host port 1127 (1126 was in use)

volumes:
  postgres_data_dev:
